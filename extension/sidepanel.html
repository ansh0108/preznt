<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prolio</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div id="app">
    <!-- LOGIN VIEW -->
    <div id="view-login" class="view">
      <div class="logo">⚡ Prolio</div>
      <p class="subtitle">Sign in to analyze your job fit and generate cover letters instantly.</p>
      <div class="form-group">
        <input type="email" id="login-email" placeholder="Email" />
      </div>
      <div class="form-group">
        <input type="password" id="login-password" placeholder="Password" />
      </div>
      <button id="login-btn" class="btn-primary">Sign In</button>
      <div id="login-error" class="error-msg"></div>
    </div>

    <!-- MAIN VIEW -->
    <div id="view-main" class="view hidden">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <span class="logo-sm">⚡ Prolio</span>
          <span id="user-name" class="user-name"></span>
        </div>
        <button id="logout-btn" class="btn-ghost-sm">Sign out</button>
      </div>

      <!-- Job detected bar -->
      <div id="job-bar" class="job-bar hidden">
        <div class="job-bar-top">
          <div>
            <div id="job-title-display" class="job-title-text"></div>
            <div id="job-company-display" class="job-company-text"></div>
          </div>
          <button id="edit-job-btn" class="btn-ghost-sm">Edit</button>
        </div>
      </div>

      <!-- Job input (manual / edit mode) -->
      <div id="job-input-area">
        <div class="section-title" style="margin-bottom:6px">Job Details</div>
        <div class="form-group">
          <input type="text" id="input-title" placeholder="Job title (e.g. Data Scientist)" />
        </div>
        <div class="form-group">
          <input type="text" id="input-company" placeholder="Company name" />
        </div>
        <div class="form-group">
          <textarea id="input-desc" rows="7" placeholder="Paste the job description here…"></textarea>
        </div>
        <button id="confirm-job-btn" class="btn-primary">Use this job →</button>
      </div>

      <!-- Tab bar -->
      <div id="tab-bar" class="tab-bar hidden">
        <button class="tab-btn active" data-tab="gap">Gap Analysis</button>
        <button class="tab-btn" data-tab="cover">Cover Letter</button>
      </div>

      <!-- GAP ANALYSIS TAB -->
      <div id="tab-gap" class="tab-content">
        <button id="run-gap-btn" class="btn-primary full-width">⚡ Analyze My Fit</button>
        <div id="gap-loading" class="loading hidden">
          <div class="spinner"></div>
          <span>Analyzing your profile against this role…</span>
        </div>
        <div id="gap-result" class="hidden"></div>
      </div>

      <!-- COVER LETTER TAB -->
      <div id="tab-cover" class="tab-content hidden">
        <button id="run-cover-btn" class="btn-primary full-width">✉️ Generate Cover Letter</button>
        <div id="cover-loading" class="loading hidden">
          <div class="spinner"></div>
          <span>Writing your cover letter…</span>
        </div>
        <div id="cover-result" class="hidden">
          <textarea id="cover-text" rows="16" spellcheck="true"></textarea>
          <div class="cover-actions">
            <input type="text" id="refine-input" placeholder="Refine: e.g. make it shorter, emphasise Python…" />
            <button id="refine-btn" class="btn-secondary">Refine</button>
          </div>
          <div class="btn-row">
            <button id="copy-btn" class="btn-half">Copy</button>
            <button id="download-pdf-btn" class="btn-half btn-outline">Download PDF</button>
          </div>
          <div id="copy-confirm" class="copy-confirm hidden">Copied!</div>
        </div>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
